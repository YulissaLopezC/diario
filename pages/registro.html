<!-- pages/registro.html -->

<div class="reg-page-head">
  <div>
    <h1 class="reg-page-title">Registro de movimientos</h1>
    <p class="reg-page-sub">Gestiona el flujo de caja de tu local con precisión.</p>
  </div>
</div>

<!-- Formulario de entrada -->
<div class="card reg-entry-card">
  <div class="reg-entry-title">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Nuevo movimiento
  </div>

  <div class="entry-form">
    <div class="field">
      <label for="inp-fecha">Fecha</label>
      <input type="date" id="inp-fecha" />
    </div>
    <div class="field">
      <label for="inp-categoria">Categoría</label>
      <select id="inp-categoria">
        <option value="Venta">Venta</option>
        <option value="Gasto">Gasto</option>
        <option value="Compra">Compra</option>
        <option value="Movimiento">Movimiento</option>
      </select>
    </div>

    <div class="field">
      <label for="inp-subcategoria">Subcategoría <span style="color:var(--text-3);font-weight:400">(opcional)</span></label>
      <select id="inp-subcategoria">
        <!-- Llenado dinámicamente -->
      </select>
    </div>
    <div class="field">
      <label for="inp-valor">Valor</label>
      <input type="text" id="inp-valor" placeholder="$ 0" inputmode="numeric" autocomplete="off" />
    </div>
    <div class="field">
      <label for="inp-proveedor">Proveedor <span style="color:var(--text-3);font-weight:400">(opcional)</span></label>
      <div class="autocomplete-wrap">
        <input type="text" id="inp-proveedor" placeholder="Nombre comercial" autocomplete="off" />
        <div class="autocomplete-list" id="prov-lista" style="display:none"></div>
      </div>
    </div>
    <div class="field">
      <label for="inp-cuenta">Cuenta</label>
      <select id="inp-cuenta">
        <!-- Llenado dinámicamente -->
      </select>
    </div>
    <div class="field">
      <label for="inp-factura">N° Factura <span style="color:var(--text-3);font-weight:400">(opcional)</span></label>
      <input type="text" id="inp-factura" placeholder="FAC-0001" />
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button class="btn-registrar" id="btn-agregar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Registrar
      </button>
    </div>
  </div>

  <p class="entry-hint">
    Presiona <strong>Enter</strong> o clic en <strong>Registrar</strong>.
    El movimiento se guarda en el mes de la fecha ingresada.
  </p>
</div>

<!-- Tabla de movimientos -->
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div class="reg-mov-title">Movimientos recientes</div>
    <div class="month-nav">
      <button class="month-arrow" id="btn-mes-prev">&#8249;</button>
      <select class="month-select" id="sel-mes"></select>
      <button class="month-arrow" id="btn-mes-next">&#8250;</button>
    </div>
  </div>

  <!-- Banner resumen del día -->
  <div id="reg-dia-banner" class="reg-dia-banner" style="display:none">
    <div>
      <div class="reg-dia-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Hoy
      </div>
    </div>
    <div class="reg-dia-row">
      <div class="reg-dia-item">
        <div class="reg-dia-item-label">Ventas</div>
        <div class="reg-dia-item-val" style="color:var(--green)" id="rd-ventas">$0</div>
      </div>
      <div class="reg-dia-sep"></div>
      <div class="reg-dia-item">
        <div class="reg-dia-item-label">Gastos</div>
        <div class="reg-dia-item-val" style="color:var(--red)" id="rd-gastos">$0</div>
      </div>
      <div class="reg-dia-sep"></div>
      <div class="reg-dia-item">
        <div class="reg-dia-item-label">Compras</div>
        <div class="reg-dia-item-val" style="color:var(--blue)" id="rd-compras">$0</div>
      </div>
      <div class="reg-dia-sep"></div>
      <div class="reg-dia-item">
        <div class="reg-dia-item-label">Balance</div>
        <div class="reg-dia-item-val" id="rd-balance">$0</div>
      </div>
    </div>
  </div>

  <div id="tabla-movimientos"></div>
  <div id="tabla-footer"></div>
</div>
