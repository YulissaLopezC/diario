<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiarIO</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>📒</text></svg>" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ── Loader inicial ── -->
  <div id="loader">Diar<span>IO</span></div>

  <!-- ── Pantalla de login ── -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-logo">Diar<span>IO</span></div>
      <p class="login-sub">Registro diario de tu local</p>
      <button id="btn-google-login" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>
      <p class="login-note">
        Sin contraseñas. Google mantiene tu sesión activa.<br/>
        Tus datos están protegidos por empresa.
      </p>
    </div>
  </div>

  <!-- ── Pantalla de configuración de empresa (primer login) ── -->
  <div id="empresa-screen" class="login-screen hidden">
    <div class="login-card" style="max-width:400px">
      <div class="login-logo">Diar<span>IO</span></div>
      <p class="login-sub" style="margin-bottom:20px">Ingresa el código de invitación de tu local</p>

      <input
        type="text"
        id="inp-codigo-empresa"
        class="login-code-input"
        placeholder="Ej: CAFET-1234"
        style="margin-bottom:6px"
      />
      <button class="btn-primary" id="btn-unirse-empresa" style="width:100%;margin-bottom:16px">Unirme al local</button>

      <div class="divider"><hr /><span>o</span><hr /></div>

      <button id="btn-logout-empresa" style="width:100%;margin-top:12px;padding:9px;border:none;background:none;font-size:12px;color:var(--text-3);cursor:pointer;text-decoration:underline">
        Cerrar sesión
      </button>

      <p class="login-note">
        Solicita el código al administrador de tu local para poder acceder.
      </p>
    </div>
  </div>

  <!-- ── Topbar ── -->
  <header id="topbar" class="hidden">
    <div class="logo" id="logo-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="10" width="4" height="8" rx="1" fill="#1D9E75"/>
        <rect x="8" y="6" width="4" height="12" rx="1" fill="#1D9E75" opacity=".7"/>
        <rect x="14" y="2" width="4" height="16" rx="1" fill="#1D9E75" opacity=".4"/>
      </svg>
      Diar<span>IO</span>
    </div>

    <nav class="nav">
      <button class="nav-btn" id="nav-dashboard">Dashboard</button>
      <button class="nav-btn" id="nav-registro">Registro</button>
      <button class="nav-btn" id="nav-informes">Informes</button>
    </nav>

    <div class="topbar-right">
      <div class="user-chip" id="user-chip">
        <div class="user-avatar"></div>
        <span class="user-name"></span>
      </div>
    </div>
  </header>

  <!-- ── App ── -->
  <main id="app" class="hidden">
    <section class="page" id="page-dashboard"></section>
    <section class="page" id="page-registro"></section>
    <section class="page" id="page-informes"></section>

    <footer class="app-footer">
      Chiripa Company &mdash; DiarIO
    </footer>
  </main>

  <!-- ── Toast container ── -->
  <div id="toast-container"></div>

  <!-- ── Bootstrap: carga páginas e inicia router ── -->
  <script type="module">
    async function loadPage(containerId, file) {
      try {
        const res  = await fetch(file);
        const html = await res.text();
        document.getElementById(containerId).innerHTML = html;
      } catch (e) {
        console.error('Error cargando', file, e);
      }
    }

    // Cargar los tres fragmentos en paralelo
    await Promise.all([
      loadPage('page-dashboard', 'pages/dashboard.html'),
      loadPage('page-registro',  'pages/registro.html'),
      loadPage('page-informes',  'pages/informes.html'),
    ]);

    // Arrancar la app
    const { init } = await import('./js/router.js');
    init();
  </script>

</body>
</html>
